name: "Build SoundFont"

on:
  push:
    branches:
      - sample-range
  pull_request:
  release:
    types:
      - created
  workflow_dispatch:
    inputs:
      ogg_quality:
        description: "ogg quality (0.0 - 1.0)"
        required: false
        default: "0.8"

jobs:
  build:
    runs-on: "ubuntu-latest"

    env:
      # --- Configuration ---
      # Set the source directory containing decompiled soundfont files
      SOURCE_DIRECTORY: "."
      # Set the default ogg quality (used for PR/Release)
      DEFAULT_OGG_QUALITY: "0.8"
      # --- End Configuration ---

      # Filenames will be set dynamically later
      SF2_FILENAME: "soundfont.sf2"
      SF3_FILENAME: "soundfont.sf3"

    steps:
      # Checkout repository source code
      - name: "Checkout code"
        uses: "actions/checkout@v6"

      # Set up Python environment (for sfutils)
      - name: "Set up Python"
        uses: "actions/setup-python@v6"
        with:
          python-version: "3.14"

      # Install ffmpeg (dependency for sfutils)
      - name: "Install ffmpeg"
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ffmpeg

      # Install sfutils repository
      - name: "Install sfutils"
        run: |
          pip install git+https://github.com/bakajikara/sfutils.git

      # Determine output filenames
      - name: "Determine output filenames"
        run: |
          if [ "${{ github.event_name }}" == "release" ]; then
            TAG_NAME="${{ github.ref_name }}"
            BASE_SF_NAME="FFXIV-${TAG_NAME}"
          elif [ "${{ github.event_name }}" == "pull_request" ]; then
            PR_NUMBER="${{ github.event.number }}"
            BASE_SF_NAME="FFXIV-PR-${PR_NUMBER}"
          else # workflow_dispatch or manual
            BRANCH_NAME=$(echo "${{ github.ref_name }}" | sed 's/\//-/g')
            SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
            BASE_SF_NAME="FFXIV-${BRANCH_NAME}-${SHORT_SHA}"
          fi

          echo "SF2_STD=${BASE_SF_NAME}-Standard.sf2" >> $GITHUB_ENV
          echo "SF3_STD=${BASE_SF_NAME}-Standard.sf3" >> $GITHUB_ENV

      # -----------------------------------------------------------------------
      # 1. Build Individual VSTs
      # -----------------------------------------------------------------------
      - name: "Build Individual VSTs"
        run: |
          # Set quality
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            export OGG_QUALITY="${{ github.event.inputs.ogg_quality }}"
          else
            export OGG_QUALITY="${{ env.DEFAULT_OGG_QUALITY }}"
          fi
          
          echo "Building individual standalone VSTs (SF2 & SF3)..."
          python build_vst.py

      # -----------------------------------------------------------------------
      # 2. Compile FFXIV Standard
      # -----------------------------------------------------------------------
      - name: "Compile FFXIV Standard"
        run: |
          echo "Compiling Standard SF2..."
          sfutils compile . "${{ env.SF2_STD }}"
          
          # Set quality
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            QUALITY="${{ github.event.inputs.ogg_quality }}"
          else
            QUALITY="${{ env.DEFAULT_OGG_QUALITY }}"
          fi
          
          echo "Compiling Standard SF3..."
          sfutils compile . "${{ env.SF3_STD }}" -q $QUALITY

      # [If PR or Manual or Push] Upload all artifacts
      - name: "Upload Artifacts"
        if: github.event_name != 'release'
        uses: "actions/upload-artifact@v5"
        with:
          name: FFXIV-SoundFonts
          path: |
            *.sf2
            *.sf3
            build/vst/

      # [If Release] Upload to GitHub Release
      - name: "Upload to Release"
        if: github.event_name == 'release'
        uses: "softprops/action-gh-release@v2"
        with:
          files: |
            ${{ env.SF2_STD }}
            ${{ env.SF3_STD }}
            build/vst/
